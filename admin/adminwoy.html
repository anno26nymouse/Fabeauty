<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F8C8DC">

<!-- iOS support -->
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
:root {
  --primary: #F8C8DC;
  --secondary: #FDE2E4;
  --accent: #E6A4B4;
  --text: #333333;
  --bg: #FFFFFF;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
}

/* HEADER */
.header {
  background: var(--primary);
  padding: 15px 20px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 2px solid var(--accent);
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: var(--secondary);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

input:focus {
  border-color: var(--accent);
}

/* BUTTON */
button {
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

/* PRIMARY BUTTON */
.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--primary);
}

/* EDIT */
.btn-edit {
  background: #4dabf7;
  color: white;
}

/* DELETE */
.btn-delete {
  background: #ff6b6b;
  color: white;
}

/* GRID */
#list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

/* TABLET */
@media (min-width: 600px) {
  #list {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* DESKTOP */
@media (min-width: 900px) {
  #list {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* PRODUCT */
.product {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 3px 12px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  transition: 0.2s;
}

.product:hover {
  transform: translateY(-4px);
}

/* IMAGE */
.product img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
}

/* CONTENT */
.product-content {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px; /* JARAK ANTAR ELEMEN */
}

/* NAMA */
.product-name {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
  min-height: 36px; /* BIAR RATA SEMUA */
}

/* HARGA */
.product-price {
  font-size: 15px;
  color: var(--accent);
  font-weight: bold;
}

/* ACTION */
.product-actions {
  display: flex;
  gap: 6px;
  margin-top: auto; /* DORONG KE BAWAH */
}

.product-actions button {
  flex: 1;
  font-size: 12px;
  padding: 8px;
  border-radius: 8px;
}


/* EMPTY */
.empty {
  text-align: center;
  opacity: 0.6;
  grid-column: span 4;
}

</style>
</head>

<body>

<div class="header">Ketul Nailart Dashboard
</div>

<div class="container">

  <div class="card">
    <h3>Tambah Produk</h3>

    <input type="text" id="name" placeholder="Nama Produk">
    <input type="number" id="price" placeholder="Harga">
    <input type="file" id="file">

    <button class="btn-primary" onclick="addProduct()">Tambah Produk</button>
  </div>

  <div class="card">
    <h3>Daftar Produk</h3>
    <div id="list"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "API_KEY_KAMU",
  authDomain: "ketul-cok.firebaseapp.com",
  projectId: "ketul-cok",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// TAMBAH
async function addProduct() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const file = document.getElementById('file').files[0];

  if (!file) return alert("Pilih file dulu!");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "Fatma-nailart");

  const res = await fetch("https://api.cloudinary.com/v1_1/do4j9uw5r/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  await db.collection("products").add({
    name,
    price,
    mediaUrl: data.secure_url,
    createdAt: new Date()
  });

  alert("Produk berhasil ditambah!");
}

// LOAD
function loadProducts() {
  db.collection("products").orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      if (snapshot.empty) {
        list.innerHTML = `<div class="empty">Belum ada produk</div>`;
        return;
      }

      snapshot.forEach(doc => {
        const p = doc.data();

        list.innerHTML += `
          <div class="product" id="${doc.id}">
            <img src="${p.mediaUrl}">
            
            <div class="product-content">
              <div class="product-name">${p.name}</div>
              <div class="product-price">Rp${p.price}</div>

              <div class="product-actions">
                <button class="btn-edit" onclick="editProduct('${doc.id}', '${p.name}', '${p.price}', '${p.mediaUrl}')">Edit</button>
                <button class="btn-delete" onclick="deleteProduct('${doc.id}')">Hapus</button>
              </div>
            </div>
          </div>
        `;
      });
    });
}

// HAPUS
async function deleteProduct(id) {
  await db.collection("products").doc(id).delete();
}

// EDIT
function editProduct(id, name, price, mediaUrl) {
  const el = document.getElementById(id);

  el.innerHTML = `
    <div style="padding:10px">
      <input type="text" id="edit-name-${id}" value="${name}">
      <input type="number" id="edit-price-${id}" value="${price}">
      <img src="${mediaUrl}" style="width:100%;border-radius:10px;margin-bottom:10px">

      <button class="btn-primary" onclick="saveEdit('${id}')">Simpan</button>
      <button onclick="loadProducts()">Cancel</button>
    </div>
  `;
}

// SAVE
async function saveEdit(id) {
  const name = document.getElementById(`edit-name-${id}`).value;
  const price = document.getElementById(`edit-price-${id}`).value;

  await db.collection("products").doc(id).update({
    name,
    price
  });

  alert("Produk diupdate!");
}

loadProducts();
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW gagal:", err));
}
</script>
</body>
</html>
