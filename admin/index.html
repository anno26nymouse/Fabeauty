<!DOCTYPE html>
<html lang="id">
<head>

<!-- PWA -->
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#F8C8DC">

<link rel="apple-touch-icon" href="../icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff;
}

.header {
  background: #F8C8DC;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #FDE2E4;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.btn-primary {
  background: #E6A4B4;
  color: white;
}

#list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.product img {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="header">Admin Dashboard</div>

<div class="container">

  <div class="card">
    <h3>Tambah Produk</h3>

    <input id="name" placeholder="Nama Produk">
    <input id="price" type="number" placeholder="Harga">
    <input type="file" id="file">

    <button class="btn-primary" onclick="addProduct()">Tambah</button>
  </div>

  <div class="card">
    <h3>List Produk</h3>
    <div id="list"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "API_KEY_KAMU",
  authDomain: "ketul-cok.firebaseapp.com",
  projectId: "ketul-cok"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ADD PRODUCT
async function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Pilih gambar dulu!");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "Fatma-nailart");

  const res = await fetch("https://api.cloudinary.com/v1_1/do4j9uw5r/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  await db.collection("products").add({
    name,
    price,
    mediaUrl: data.secure_url,
    createdAt: new Date()
  });

  alert("Produk ditambahkan!");
}

// LOAD DATA
function loadProducts() {
  db.collection("products")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const p = doc.data();

        list.innerHTML += `
          <div class="product">
            <img src="${p.mediaUrl}">
            <b>${p.name}</b><br>
            Rp${p.price}
          </div>
        `;
      });
    });
}

loadProducts();
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("../sw.js", {
    scope: "/Fabeauty/"
  })
  .then(() => console.log("SW OK"))
  .catch(err => console.log("SW ERROR:", err));
}
</script>

</body>
</html>
