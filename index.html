<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fabeauty Nailart Premium</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink-primary: #E6A4B4;
            --pink-light: #FDE2E4;
            --pink-border: #F8C8DC;
            --shadow-3d: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.05), inset 0 -2px 0 #F8C8DC;
            --glass: rgba(255, 255, 255, 0.85);
            /* OPTIMASI: Variable untuk jumlah karakter "STUDIO COLLECTION" (17 karakter) */
            --chars: 17; 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        *:focus { outline: none; }

        body {
            background: #F3F0F2;
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* ================= HEADER 3D ================= */
        header {
            position: sticky;
            top: 20px;
            margin: 0 15px;
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,255,255,0.75));
            backdrop-filter: blur(14px);
            padding: 10px 5px;
            border: 1.5px solid var(--pink-border);
            border-radius: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.8);
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header.scrolled {
            top: 0;
            margin: 0;
            border-radius: 0 0 25px 25px;
            background: var(--glass);
        }

        .brand-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-preview {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-primary);
            margin-left: 15px;
            filter: drop-shadow(0 0 8px rgba(230, 164, 180, 0.4));
            transition: 0.3s;
        }

        .premium-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ================= ANIMASI SVG & TEXT OPTIMIZED ================= */
        .premium-svg-container { width: 240px; }

        .custom-path {
            fill: transparent;
            stroke: #000;
            stroke-width: 0.15;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
        }

        @keyframes drawSVG { to { stroke-dashoffset: 0; } }
        @keyframes fillSVG { 
            from { fill: transparent; } 
            to { fill: var(--pink-primary); } 
        }

        .section-title {
            letter-spacing: 4px; /* Sedikit dirapatkan agar stabil di mobile */
            color: #000;
            font-size: 10px;
            font-weight: 800;
            margin-top: -5px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid var(--pink-primary);
            width: 0;
            will-change: width; /* Optimasi render mobile */
        }

        /* Animasi  menggunakan satuan ch agar presisi per karakter */
        .section-title {
    display: inline-block;
    letter-spacing: 9px;
    color: black;
    font-size: 10px;
    font-weight: 800;
    margin-top: -5px;
    opacity: 0.8;
    transform: translateX(22px);
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid black;
    margin-left: -25px;

    width: 0;
}
.section-title.typing {
    animation: typing 3s steps(17, end) forwards,
               blink 0.7s infinite;
}

.section-title.done {
    animation: none;
    width: 40ch;
    border-right: none;
}
@keyframes typing {
    from { width: 0 }
    to { width: 40ch }
}

@keyframes blink {
    50% { border-color: transparent }
}


        /* ================= GRID SISTEM ================= */
        main { padding: 30px 15px; }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 800px;
            margin: auto;
        }

        /* ================= CARD 3D EFFECT ================= */
        .card { perspective: 1000px; height: 260px; cursor: pointer; }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flip .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            backface-visibility: hidden;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(230,164,180,0.2);
        }

        .card-front img { width: 100%; height: 100%; object-fit: cover; }

        .product-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--pink-primary);
            color: #fff;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-preview {
            position: absolute;
            bottom: 12px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 800;
            color: var(--pink-primary);
            border: 1px solid var(--pink-primary);
        }

        .card-back {
            background: linear-gradient(135deg, #FDE2E4, #F8C8DC);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            text-align: center;
        }

        .price { font-weight: 800; font-size: 15px; margin-bottom: 15px; color: #444; }

        .btn-order {
            background: var(--pink-primary);
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(230, 164, 180, 0.4);
        }

        /* ================= FLOATING BAR ================= */
        .floating-bar {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--pink-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 999;
        }

        .float-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid var(--pink-primary);
            color: var(--pink-primary);
            transition: 0.3s;
        }

        .icon { width: 18px; height: 18px; fill: currentColor; }
        .float-btn.ig:hover { background: #E1306C; color: #fff; }
        .float-btn.loc:hover { background: #EA4335; color: #fff; }
        .float-btn.wa:hover { background: #25D366; color: #fff; }

        /* ================= FOOTER ================= */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            height: 35px;
            background: var(--glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            border-top: 1px solid var(--pink-border);
            transform: translateY(100%);
            transition: 0.4s;
            z-index: 1000;
        }
        footer.show { transform: translateY(0); }

        /* ================= MODAL ================= */
        .preview-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 2000;
        }
        .preview-modal.active { opacity: 1; pointer-events: all; }
        .preview-modal img { max-width: 90%; max-height: 80%; border-radius: 15px; }
    </style>
</head>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyAI-wxaB9T6ts5W_LFGHTMh-LY4QEMOiMA",
    authDomain: "ketul-cok.firebaseapp.com",
    projectId: "ketul-cok",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// --- ANIMASI LOGO & TEXT (OPTIMIZED) ---
function runAnimations() {
    const path = document.getElementById('logoPath');
    const title = document.querySelector('.section-title');

    function animateSVG() {
    const oldPath = document.querySelector('.custom-path');

    if (!oldPath || !oldPath.parentNode) return;

    const newPath = oldPath.cloneNode(true);

    newPath.style.animation = 'none';
    newPath.style.strokeDashoffset = '2000';
    newPath.style.fill = 'transparent';

    oldPath.parentNode.replaceChild(newPath, oldPath);

    void newPath.offsetWidth;

    newPath.style.animation = `
        drawSVG 4s ease-in-out forwards,
        fillSVG 1.2s ease forwards 3.5s
    `;

    setTimeout(animateSVG, 6500);
}


    function animateText() {
    const title = document.querySelector('.section-title');

    // 1. Reset: Hapus class dan paksa browser menghitung ulang (reflow)
    title.classList.remove('typing', 'done');
    void title.offsetWidth; // Trik "magic" agar animasi bisa di-restart

    // 2. Mulai Mengetik
    title.classList.add('typing');

    // 3. Setelah durasi mengetik selesai (3 detik sesuai CSS)
    setTimeout(() => {
        title.classList.remove('typing');
        title.classList.add('done');

        // 4. Beri waktu user membaca (misal 4 detik) sebelum menghilang dan ulang
        setTimeout(() => {
            // Animasi menghilang sejenak sebelum loop
            title.style.transition = "opacity 0.5s";
            title.style.opacity = "0";

            setTimeout(() => {
                title.style.opacity = "0.8";
                animateText(); // Panggil fungsi ini lagi (Looping)
            }, 500);

        }, 4000); 

    }, 3000); 
}


    animateSVG();
    animateText();
}

// --- CATALOG MANAGEMENT ---
function flipCard(card) {
    card.classList.toggle('flip');
}

function loadCatalog() {
    db.collection("products").orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {
        const container = document.getElementById("products");
        container.innerHTML = "";
        snapshot.forEach(doc => {
            const p = doc.data();
            container.innerHTML += `
                <div class="card" onclick="flipCard(this)">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="product-badge">${p.name}</div>
                            <img src="${p.mediaUrl}" loading="lazy">
                            <button class="btn-preview" onclick="openPreview(event, '${p.mediaUrl}')">Preview</button>
                        </div>
                        <div class="card-back">
                            <div class="price">Rp. ${p.price}</div>
                            <a href="https://wa.me/6283156512309?text=Halo%20kak,%20saya%20tertarik%20${encodeURIComponent(p.name)}" 
                               target="_blank" class="btn-order" onclick="event.stopPropagation()">Pesan Sekarang</a>
                        </div>
                    </div>
                </div>`;
        });
    });
}

// --- UI HELPERS ---
function openPreview(e, url) {
    e.stopPropagation();
    const modal = document.getElementById("previewModal");
    const img = document.getElementById("previewImg");
    img.src = url;
    modal.classList.add("active");
}

function closePreview() {
    document.getElementById("previewModal").classList.remove("active");
}

// Scroll Effects
window.addEventListener("scroll", () => {
    const header = document.getElementById("mainHeader");
    const footer = document.getElementById("mainFooter");
    
    if (window.scrollY > 20) header.classList.add("scrolled");
    else header.classList.remove("scrolled");

    const isBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;
    if (isBottom) footer.classList.add("show");
    else footer.classList.remove("show");
});

window.onload = () => {
    runAnimations();
    loadCatalog();
};
</script>
